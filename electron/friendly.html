<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polux Launcher - Friendly</title>
    <link rel="stylesheet" href="./friendly.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero card">
        <div class="hero-text">
          <p class="eyebrow">PoluxLauncher</p>
          <h1>Launch Minecraft in 2 clicks</h1>
          <p class="lead">
            Install Forge + mods once, then launch directly on the Polux server.
          </p>
        </div>
        <div class="hero-badge" id="runState">Idle</div>
      </section>

      <section class="layout">
        <article class="card panel">
          <h2>Player</h2>
          <label for="username">Minecraft username</label>
          <input id="username" type="text" placeholder="Player" maxlength="16" />

          <div class="settings-grid">
            <div class="setting-row">
              <label for="themeMode">Theme</label>
              <select id="themeMode">
                <option value="friendly">Friendly (Light)</option>
                <option value="tactical">Tactical (Black)</option>
              </select>
            </div>
            <div class="setting-row">
              <label for="ramGb">Allocated RAM</label>
              <select id="ramGb">
                <option value="2">2 GB</option>
                <option value="3">3 GB</option>
                <option value="4">4 GB</option>
                <option value="6">6 GB</option>
                <option value="8">8 GB</option>
                <option value="10">10 GB</option>
                <option value="12">12 GB</option>
                <option value="16">16 GB</option>
              </select>
            </div>
            <div class="setting-row">
              <label for="accountMode">Account</label>
              <select id="accountMode">
                <option value="offline">Offline</option>
                <option value="microsoft">Microsoft (Premium)</option>
              </select>
            </div>
          </div>

          <div class="auth-actions">
            <button id="authBtn" class="btn btn-ghost" type="button">Connect Microsoft</button>
            <span id="authState" class="auth-state">Offline mode active.</span>
          </div>

          <div class="meta">
            <div>
              <span class="k">Server</span>
              <span class="v">poluxcity.falixsrv.me</span>
            </div>
            <div>
              <span class="k">Version</span>
              <span class="v">1.20.1 + Forge</span>
            </div>
          </div>

          <div class="actions">
            <button id="installBtn" class="btn btn-primary" type="button">Install Mods</button>
            <button id="playBtn" class="btn btn-secondary" type="button">Play</button>
          </div>

          <p id="status" class="status">Ready</p>
          <div id="updateNotice" class="update-notice hidden">
            <div id="updateNoticeText">Update available.</div>
            <button id="updateBtn" class="btn btn-ghost" type="button">Open</button>
          </div>

          <div class="progress-wrap" aria-hidden="true">
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <span id="progressText">0%</span>
          </div>
        </article>

        <article class="card panel logs">
          <div class="logs-head">
            <div class="tabs" role="tablist" aria-label="Output tabs">
              <button id="tabConsole" class="tab-btn active" type="button" role="tab" aria-selected="true">Console</button>
              <button id="tabLogs" class="tab-btn" type="button" role="tab" aria-selected="false">Logs</button>
              <button id="tabChangelog" class="tab-btn" type="button" role="tab" aria-selected="false">Changelog</button>
            </div>
            <button id="clearBtn" class="btn btn-ghost" type="button">Clear</button>
          </div>
          <pre id="console" class="tab-panel active" aria-live="polite"></pre>
          <pre id="crashReport" class="tab-panel" aria-live="polite"></pre>
          <pre id="changelog" class="tab-panel" aria-live="polite"></pre>
        </article>
      </section>
    </main>

    <script src="./renderer-friendly.js"></script>
  </body>
</html>
